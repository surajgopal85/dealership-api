# Database Configuration - Let Hibernate create tables from entities
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Remove the problematic quoted identifiers setting
# spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Keep the helpful settings
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.validator.apply_to_ddl=false

# H2 Console (helpful for debugging)
spring.h2.console.enabled=true

# Show SQL queries (helpful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true